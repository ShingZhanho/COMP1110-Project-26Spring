[tool.ruff]
target-version = "py311"
line-length = 100
src = ["campus_nav"]

[tool.ruff.lint]
# Enforce import sorting/grouping for maintainable imports.
select = ["I"]

[tool.ruff.lint.isort]
known-first-party = ["campus_nav"]

[tool.pylint.main]
py-version = "3.11"

[tool.pylint.messages_control]
# Run pylint only as a circular-import detector.
disable = ["all"]
enable = ["cyclic-import"]

