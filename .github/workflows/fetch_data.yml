name: Fetch CSV Data

on:
  schedule:
    # 00:00 UTC+8 = 16:00 UTC (previous day)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install runtime dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch latest CSV data
        run: |
          python -c "from campus_nav.utils import fetch_csv_from_google_sheet; fetch_csv_from_google_sheet()"

      - name: Generate commit date (UTC+8)
        id: commit_date
        run: |
          echo "value=$(TZ='Asia/Hong_Kong' date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Commit changes and open/update PR
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ github.event.repository.default_branch }}
          branch: ci/chore-data
          title: "[chore, ci-auto] Update CSV Data (Automated)"
          commit-message: "chore: update CSV data (${{ steps.commit_date.outputs.value }})"
          body: |
            Automated daily csv refresh from Google Sheets.
          add-paths: |
            campus_nav/data/*.csv
          delete-branch: false
          sign-commits: 'true'



