name: Python Import Checks

on:
  push:
    paths:
      - "campus_nav/**/*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - "python_checks.yml"
  pull_request:
    paths:
      - "campus_nav/**/*.py"
      - "pyproject.toml"
      - "requirements*.txt"
      - "python_checks.yml"

jobs:
  import_checks:
    ###
    # Checks for import ordering, grouping, and circular imports in the campus_nav package.
    ###
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Check import ordering and grouping (ruff)
        run: ruff check --select I campus_nav

      - name: Check for circular imports (pylint)
        run: pylint --disable=all --enable=cyclic-import campus_nav

  compile_checks:
    ###
    # Compiles Python files to check for syntax errors in the campus_nav package.
    ###
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile Python files to check for syntax errors
        run: python -m compileall campus_nav